// ═══════════════════════════════════════════════════════════════════════════════
// ENGINE
// ═══════════════════════════════════════════════════════════════════════════════

const $ = id => document.getElementById(id);
let paused = false, tmr = null, arTmr = null, cdInt = null;
let slideStart = 0, slideDuration = 0;
let lang = 'both'; // 'en', 'es', 'both'
let interactions = 0;
const CIRC = 2 * Math.PI * 45; // ~283 for countdown ring

// ── ENTRANCE ANIMATIONS (randomly chosen) ──
const anims = [
  'animate__fadeIn','animate__fadeInUp','animate__fadeInDown',
  'animate__zoomIn','animate__fadeInLeft','animate__fadeInRight'
];
function randAnim(){ return 'animate__animated ' + anims[Math.floor(Math.random() * anims.length)]; }

// ── SHUFFLE (Fisher-Yates) ──
function shuffle(arr){
  const a = [...arr];
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── DECKS (no repeats until all items shown) ──
const originals = { img: images, yt: ytVids, vid: localVids, tri: trivia, quote: quotes, fact: facts };
const decks = {};
function initDecks(){
  for(const k in originals) decks[k] = shuffle(originals[k]);
}
function draw(type){
  if(!decks[type] || !decks[type].length) decks[type] = shuffle(originals[type]);
  return decks[type].pop();
}
initDecks();

// ── HISTORY (ring buffer of last 12 slides) ──
const HIST_MAX = 12;
const hist = [];   // [{type, data, revealed}] newest at end
let histPos = -1;  // -1 = live (newest), 0..length-1 = browsing

function pushHist(type, data){
  // Only push when in live mode (not replaying history)
  if(histPos >= 0) return;
  hist.push({type: type, data: data, revealed: false});
  if(hist.length > HIST_MAX) hist.shift();
  updateHistUI();
}

function updateHistUI(){
  const btn = $('prevBtn');
  const ind = $('hist-ind');
  if(hist.length <= 1 && histPos < 0){
    btn.disabled = true;
    ind.textContent = '';
  } else if(histPos >= 0){
    btn.disabled = histPos <= 0;
    ind.textContent = (histPos + 1) + '/' + hist.length;
  } else {
    btn.disabled = hist.length <= 1 ? true : false;
    ind.textContent = '';
  }
}

// ── UI HELPERS ──
function hideAll(){
  document.querySelectorAll('.slide').forEach(s => {
    s.classList.remove('on');
    s.className = 'slide';
  });
  $('syt').src = '';
  const v = $('svid'); v.pause(); v.removeAttribute('src');
  $('cap').textContent = '';
  clearTimeout(arTmr);
  clearInterval(cdInt);
}

function showSlide(id){
  const el = $(id);
  el.className = 'slide on ' + randAnim();
}

function prog(ms){
  const p = $('prog');
  p.style.transition = 'none'; p.style.width = '0';
  requestAnimationFrame(() => { p.style.transition = 'width ' + ms + 'ms linear'; p.style.width = '100vw'; });
}

function sched(ms){
  slideDuration = ms; slideStart = Date.now();
  prog(ms); if(!paused) tmr = setTimeout(next, ms);
}

function langVis(en, es){
  if(lang === 'en') return en ? '' : 'none';
  if(lang === 'es') return es ? '' : 'none';
  return '';
}

function updateInteractions(){
  interactions++;
  $('interact-count').textContent = interactions + ' interactions today';
}

// ── COUNTDOWN TIMER ──
function startCountdown(seconds){
  const ring = $('cd-ring');
  const num = $('cd-num');
  ring.style.transition = 'none';
  ring.style.strokeDashoffset = '0';
  num.textContent = seconds;
  requestAnimationFrame(() => {
    ring.style.transition = 'stroke-dashoffset ' + seconds + 's linear';
    ring.style.strokeDashoffset = CIRC;
  });
  let rem = seconds;
  clearInterval(cdInt);
  cdInt = setInterval(() => {
    rem--;
    num.textContent = Math.max(0, rem);
    if(rem <= 0) clearInterval(cdInt);
  }, 1000);
}

// ── CONFETTI ──
function confetti(){
  const colors = ['#f0c040','#ff6b6b','#4ecdc4','#fff','#a855f7','#3b82f6','#f97316'];
  for(let i = 0; i < 50; i++){
    const el = document.createElement('div');
    el.className = 'cft';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
    el.style.animationDelay = Math.random() * 0.6 + 's';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    const size = Math.random() * 8 + 5;
    el.style.width = size + 'px';
    el.style.height = size + 'px';
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4500);
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// SLIDE SHOW FUNCTIONS  (each accepts optional replay data)
// ═══════════════════════════════════════════════════════════════════════════════

function showImg(replay){
  hideAll();
  const src = replay || draw('img');
  const img = $('simg');
  function onLoaded(){ img.onload = img.onerror = null; showSlide('s-img'); sched(DUR.img); }
  img.onload = onLoaded;
  img.onerror = function(){ img.onload = img.onerror = null; next(); };
  img.src = encodeURI(src);
  // Handle already-cached images (onload won't re-fire for same src)
  if(img.complete && img.naturalWidth > 0) onLoaded();
  $('cap').textContent = src.split('/').pop().replace(/\.\w+$/, '');
  if(!replay){ pushHist('img', src); (new Image()).src = encodeURI(images[Math.floor(Math.random()*images.length)]); }
  updateHistUI();
}

function showYT(replay){
  hideAll();
  const v = replay || draw('yt');
  const yt = $('syt');
  yt.className = v.s ? 'yt-p' : 'yt-l';
  yt.src = 'https://www.youtube.com/embed/' + v.id + '?autoplay=1&mute=1&controls=0&modestbranding=1&rel=0&loop=1&playlist=' + v.id;
  showSlide('s-yt');
  $('cap').textContent = v.t;
  sched(v.s ? DUR.yts : DUR.yt);
  if(!replay) pushHist('yt', v);
  updateHistUI();
}

function showVid(replay){
  hideAll();
  const src = replay || draw('vid');
  const v = $('svid');
  v.src = encodeURI(src);
  v.play().catch(function(){});
  showSlide('s-vid');
  $('cap').textContent = 'Video';
  v.onended = function(){ if(!paused) next(); };
  sched(DUR.vid);
  if(!replay) pushHist('vid', src);
  updateHistUI();
}

function showTri(replay, forceReveal){
  hideAll();
  const t = replay || draw('tri');
  // category
  $('tcat').textContent = t[0];
  $('tcat').style.display = langVis(true, false);
  $('tcat-es').textContent = catES[t[0]] || t[0];
  $('tcat-es').style.display = langVis(false, true);
  // questions
  $('tq-en').textContent = t[1];
  $('tq-en').style.display = langVis(true, false);
  $('tq-en').className = 'tri-q ' + randAnim();
  $('tq-es').textContent = t[3];
  $('tq-es').style.display = langVis(false, true);
  $('tq-es').className = 'tri-q-es ' + randAnim();
  // answers
  $('ta-en').textContent = t[2];
  $('ta-en').style.display = langVis(true, false);
  $('ta-es').textContent = t[4];
  $('ta-es').style.display = langVis(false, true);

  if(forceReveal){
    // Replaying already-revealed trivia — show answer immediately
    $('ta-en').className = 'tri-a show';
    $('ta-es').className = 'tri-a-es show';
    $('rbtn').style.display = 'none';
    $('tri-cd').style.display = 'none';
  } else {
    $('ta-en').className = 'tri-a';
    $('ta-es').className = 'tri-a-es';
    $('rbtn').style.display = '';
    $('tri-cd').style.display = '';
    const cdSec = Math.round(DUR.tri / 1000);
    startCountdown(cdSec);
    arTmr = setTimeout(reveal, (cdSec - 3) * 1000);
  }
  showSlide('s-tri');
  sched(DUR.tri);
  if(!replay) pushHist('tri', t);
  updateHistUI();
}

function showQuote(replay){
  hideAll();
  const q = replay || draw('quote');
  $('q-en').textContent = q[0];
  $('q-en').style.display = langVis(true, false);
  $('q-en').className = 'quote-en ' + randAnim();
  $('q-es').textContent = q[1];
  $('q-es').style.display = langVis(false, true);
  $('q-es').className = 'quote-es ' + randAnim();
  $('q-attr').textContent = q[2];
  showSlide('s-quote');
  sched(DUR.quote);
  if(!replay) pushHist('quote', q);
  updateHistUI();
}

function showFact(replay){
  hideAll();
  const f = replay || draw('fact');
  $('f-en').textContent = f[0];
  $('f-en').style.display = langVis(true, false);
  $('f-en').className = 'fact-en ' + randAnim();
  $('f-es').textContent = f[1];
  $('f-es').style.display = langVis(false, true);
  $('f-es').className = 'fact-es ' + randAnim();
  showSlide('s-fact');
  sched(DUR.fact);
  if(!replay) pushHist('fact', f);
  updateHistUI();
}

// ── REPLAY A HISTORY ENTRY ──
function replayEntry(entry){
  switch(entry.type){
    case 'img':   showImg(entry.data);   break;
    case 'yt':    showYT(entry.data);    break;
    case 'vid':   showVid(entry.data);   break;
    case 'tri':   showTri(entry.data, entry.revealed); break;
    case 'quote': showQuote(entry.data); break;
    case 'fact':  showFact(entry.data);  break;
    default:      showImg(entry.data);
  }
}

// ── REVEAL ANSWER ──
function reveal(){
  $('ta-en').className = 'tri-a show ' + (lang !== 'es' ? 'animate__animated animate__bounceIn' : '');
  $('ta-es').className = 'tri-a-es show ' + (lang !== 'en' ? 'animate__animated animate__bounceIn' : '');
  $('rbtn').style.display = 'none';
  $('tri-cd').style.display = 'none';
  clearTimeout(arTmr);
  clearInterval(cdInt);
  confetti();
  updateInteractions();
  // Mark revealed in history so replaying shows the answer
  const idx = histPos >= 0 ? histPos : hist.length - 1;
  if(idx >= 0 && hist[idx] && hist[idx].type === 'tri') hist[idx].revealed = true;
}

// ── NAVIGATION ──
function prev(){
  clearTimeout(tmr);
  clearTimeout(arTmr);
  clearInterval(cdInt);
  if(hist.length <= 1) return;
  if(histPos < 0){
    // Currently live — jump to second-to-last (the one before current)
    histPos = hist.length - 2;
  } else if(histPos > 0){
    histPos--;
  } else {
    return; // already at oldest
  }
  replayEntry(hist[histPos]);
}

function next(){
  clearTimeout(tmr);
  clearTimeout(arTmr);
  clearInterval(cdInt);

  // If browsing history, step forward
  if(histPos >= 0){
    if(histPos < hist.length - 1){
      histPos++;
      replayEntry(hist[histPos]);
      // If we've returned to the newest, go back to live mode
      if(histPos === hist.length - 1) histPos = -1;
      return;
    }
    // At the end of history — go live
    histPos = -1;
  }

  // Live mode — pick new random content
  const r = Math.random();
  let cum = 0;
  const types = Object.keys(WEIGHTS);
  for(const type of types){
    cum += WEIGHTS[type];
    if(r < cum){
      switch(type){
        case 'img':   showImg();   return;
        case 'tri':   showTri();   return;
        case 'yt':    showYT();    return;
        case 'quote': showQuote(); return;
        case 'fact':  showFact();  return;
        case 'vid':   showVid();   return;
      }
    }
  }
  showImg();
}

// ── CONTROLS ──
function pp(){
  paused = !paused;
  $('ppb').innerHTML = paused ? '&#x25B6; Play' : '&#x23F8; Pause';
  $('pind').style.display = paused ? 'block' : 'none';
  if(paused){
    clearTimeout(tmr);
  } else {
    // Resume current slide with remaining time (min 2s)
    const remaining = Math.max(2000, slideDuration - (Date.now() - slideStart));
    prog(remaining);
    tmr = setTimeout(next, remaining);
  }
}

function goFS(){
  if(!document.fullscreenElement) document.documentElement.requestFullscreen().catch(function(){});
  else document.exitFullscreen();
}

function cycleLang(){
  if(lang === 'both') lang = 'en';
  else if(lang === 'en') lang = 'es';
  else lang = 'both';
  const labels = { both: 'EN/ES', en: 'EN', es: 'ES' };
  $('langBtn').textContent = labels[lang];
  $('langBtn').classList.toggle('active', lang !== 'both');
}

// ── KEYBOARD SHORTCUTS ──
document.addEventListener('keydown', function(e){
  if(e.code === 'Space'){ e.preventDefault(); pp(); }
  if(e.code === 'ArrowRight' || e.code === 'Enter') next();
  if(e.code === 'ArrowLeft') prev();
  if(e.code === 'KeyF') goFS();
  if(e.code === 'KeyL') cycleLang();
  if(e.code === 'KeyR'){
    const triSlide = $('s-tri');
    if(triSlide.classList.contains('on')) reveal();
  }
});

// ── START ──
next();
</script>
